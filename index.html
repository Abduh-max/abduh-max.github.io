<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f3f5f8">
<title>Etalase — Aplikasi oleh Abduh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3f5f8;
    --surface:#ffffff;
    --border:#e2e6ec;
    --ink:#12172b;
    --muted:#68708a;
    --accent:#3654ff;
    --accent-soft:#eaedff;
    --accent-ink:#22307a;
    --success:#1f9d55;
    --success-soft:#e7f7ed;
    --font-display: 'Sora', ui-sans-serif, system-ui, sans-serif;
    --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    padding:22px 16px 48px;
  }
  .wrap{ max-width:640px; margin:0 auto; }

  /* header */
  header{ margin-bottom:22px; }
  .brand-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
  }
  .brand-mark{
    width:40px; height:40px;
    border-radius:11px;
    background:linear-gradient(135deg, var(--accent), #6f8bff);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-family:var(--font-display);
    font-weight:800;
    font-size:17px;
    flex-shrink:0;
  }
  .brand-text h1{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:800;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand-text p{
    font-size:12px;
    color:var(--muted);
    margin:2px 0 0;
  }

  .search-row{
    display:flex;
    align-items:center;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 14px;
    gap:10px;
    margin-bottom:14px;
  }
  .search-row svg{ flex-shrink:0; color:var(--muted); }
  .search-row input{
    border:none; outline:none; background:transparent;
    font-family:var(--font-body);
    font-size:14px;
    color:var(--ink);
    width:100%;
  }
  .search-row input::placeholder{ color:var(--muted); }

  .filter-row{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
    margin-bottom:20px;
  }
  .filter-row::-webkit-scrollbar{ display:none; }
  .chip{
    flex-shrink:0;
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:#fff;
  }

  .section-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 10px 2px;
  }

  .grid{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* app card */
  .app-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
  }
  .app-top{
    display:flex;
    gap:13px;
    margin-bottom:12px;
  }
  .app-icon{
    width:58px; height:58px;
    border-radius:15px;
    overflow:hidden;
    flex-shrink:0;
    border:1px solid var(--border);
    background:#f6f7fa;
  }
  .app-icon img{ width:100%; height:100%; display:block; object-fit:cover; }

  .app-info{ flex:1; min-width:0; }
  .app-info .name-row{
    display:flex;
    align-items:center;
    gap:7px;
    flex-wrap:wrap;
  }
  .app-info h2{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.005em;
  }
  .cat-tag{
    font-size:10.5px;
    font-weight:700;
    color:var(--accent-ink);
    background:var(--accent-soft);
    padding:3px 8px;
    border-radius:6px;
    font-family:var(--font-body);
  }
  .app-info .desc{
    font-size:12.5px;
    color:var(--muted);
    margin:5px 0 0;
    line-height:1.45;
  }

  .app-meta{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--muted);
    margin-bottom:13px;
  }
  .meta-dot{ width:5px; height:5px; border-radius:50%; background:var(--success); flex-shrink:0; }
  .meta-item{ display:flex; align-items:center; gap:5px; }

  .app-actions{ display:flex; gap:9px; }
  .btn{
    flex:1;
    text-align:center;
    padding:10.5px 10px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    text-decoration:none;
    font-family:var(--font-body);
    border:1px solid transparent;
    cursor:pointer;
  }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-secondary{ background:var(--surface); border-color:var(--border); color:var(--ink); }

  .empty-state{
    text-align:center;
    padding:36px 20px;
    color:var(--muted);
    font-size:13px;
  }

  .coming-soon{
    border:1.5px dashed var(--border);
    border-radius:16px;
    padding:22px 16px;
    text-align:center;
    color:var(--muted);
    font-size:12.5px;
    font-family:var(--font-mono);
  }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:28px;
    font-family:var(--font-body);
  }
  footer a{ color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand-row">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <h1>Etalase</h1>
        <p>Aplikasi buatan Abduh, siap pakai di HP</p>
      </div>
    </div>

    <div class="search-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="search-input" placeholder="Cari aplikasi...">
    </div>

    <div class="filter-row" id="filter-row"></div>
  </header>

  <div class="section-label" id="result-label">Semua Aplikasi</div>
  <div class="grid" id="app-grid"></div>

  <footer>Dikelola langsung dari <a href="https://github.com/abduh-max" target="_blank" rel="noopener">GitHub</a></footer>
</div>

<script>
  // ---- Daftar aplikasi: tambahkan objek baru di sini untuk aplikasi berikutnya ----
  const APPS = [
    {
      id: 'rpm-bengkel',
      name: 'RPM Bengkel',
      category: 'Teknik Mesin',
      description: 'Kalkulator Cutting Speed & RPM untuk bubut dan milling.',
      version: 'v1.0',
      offline: true,
      icon: 'https://abduh-max.github.io/rpm-bengkel/icon-192.png',
      apkUrl: 'https://github.com/Abduh-max/rpm-bengkel/releases/download/v1.0/RPM.Bengkel.apk',
      browserUrl: 'https://abduh-max.github.io/rpm-bengkel/'
    }
    // Contoh menambah aplikasi baru nanti:
    // {
    //   id: 'nama-app',
    //   name: 'Nama Aplikasi',
    //   category: 'Kategori Baru',
    //   description: 'Deskripsi singkat satu baris.',
    //   version: 'v1.0',
    //   offline: true,
    //   icon: 'https://.../icon-192.png',
    //   apkUrl: 'https://.../nama.apk',
    //   browserUrl: 'https://.../'
    // }
  ];

  let activeCategory = 'Semua';
  let searchTerm = '';

  const grid = document.getElementById('app-grid');
  const filterRow = document.getElementById('filter-row');
  const resultLabel = document.getElementById('result-label');
  const searchInput = document.getElementById('search-input');

  function buildFilters(){
    const categories = ['Semua', ...new Set(APPS.map(a => a.category))];
    filterRow.innerHTML = '';
    categories.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (cat === activeCategory ? ' active' : '');
      chip.textContent = cat;
      chip.addEventListener('click', () => {
        activeCategory = cat;
        buildFilters();
        render();
      });
      filterRow.appendChild(chip);
    });
  }

  function cardHTML(app){
    return `
      <div class="app-card">
        <div class="app-top">
          <div class="app-icon"><img src="${app.icon}" alt="Ikon ${app.name}"></div>
          <div class="app-info">
            <div class="name-row">
              <h2>${app.name}</h2>
              <span class="cat-tag">${app.category}</span>
            </div>
            <p class="desc">${app.description}</p>
          </div>
        </div>
        <div class="app-meta">
          <span class="meta-item"><span class="meta-dot"></span>Aktif</span>
          <span class="meta-item">${app.version}</span>
          ${app.offline ? '<span class="meta-item">Bisa Offline</span>' : ''}
        </div>
        <div class="app-actions">
          <a class="btn btn-primary" href="${app.apkUrl}">Unduh APK</a>
          <a class="btn btn-secondary" href="${app.browserUrl}" target="_blank" rel="noopener">Buka di Browser</a>
        </div>
      </div>
    `;
  }

  function render(){
    const filtered = APPS.filter(a => {
      const matchCategory = activeCategory === 'Semua' || a.category === activeCategory;
      const matchSearch = a.name.toLowerCase().includes(searchTerm.toLowerCase());
      return matchCategory && matchSearch;
    });

    resultLabel.textContent = activeCategory === 'Semua' ? 'Semua Aplikasi' : activeCategory;

    if (filtered.length === 0){
      grid.innerHTML = '<div class="empty-state">Tidak ada aplikasi yang cocok.</div>';
      return;
    }

    grid.innerHTML = filtered.map(cardHTML).join('') + '<div class="coming-soon">Aplikasi berikutnya menyusul di sini</div>';
  }

  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    render();
  });

  buildFilters();
  render();
</script>
</body>
</html>
